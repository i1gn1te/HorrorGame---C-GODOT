  <text x="945" y="190" fill="#9dd6ff" font-family="Arial" font-size="30" font-weight="700">Rytm</text>
  <text x="945" y="245" fill="#9dd6ff" font-family="Arial" font-size="22">- maszyny zagluszaja kroki</text>
  <text x="945" y="285" fill="#9dd6ff" font-family="Arial" font-size="22">- blysk laduje sie wolniej</text>
  <text x="945" y="325" fill="#9dd6ff" font-family="Arial" font-size="22">- glosne korytarze = pewnosc falszywa</text>
