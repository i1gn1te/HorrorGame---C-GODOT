    <rect x="100" y="150" width="35" height="650"/>
    <rect x="825" y="150" width="35" height="650"/>
    <rect x="220" y="185" width="35" height="480"/>
    <rect x="360" y="300" width="35" height="465"/>
    <rect x="500" y="185" width="35" height="430"/>
    <rect x="640" y="300" width="35" height="465"/>
  </g>
  <g fill="#67d6ff" opacity="0.9">
